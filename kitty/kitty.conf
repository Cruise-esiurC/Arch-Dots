shell zsh --login -c "fastfetch; exec zsh"
include theme.conf
# Set terminal opacity (0.0 is completely transparent, 1.0 is completely solid)
background_opacity 0.4

# Optional: Prevents your text/fonts from becoming blurry or transparent
dynamic_background_opacity yes

confirm_os_window_close 0

symbol_map U+E0A0-U+E0A3,U+E0B0-U+E0C8,U+E0CA,U+E0CC-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B1,U+E700-U+E7C5,U+EA60-U+EBEB,U+F000-U+F2E0,U+F300-U+F372,U+F400-U+F533,U+F500-U+FD46,U+F0001-U+F1AF0 Symbols Nerd Font Mono
